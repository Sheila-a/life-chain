databases:
  - name: life-chain-db
    databaseName: lifechain
    user: lifechain
    plan: free

services:
  - type: web
    name: life-chain-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/resources/search
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: life-chain-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VAULT_MASTER_KEY
        generateValue: true
